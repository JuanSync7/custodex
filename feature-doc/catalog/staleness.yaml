# Feature catalog — `staleness` subsystem (EPIC SLA: time-based review accountability).
# The time-based half of accountability (EPIC OWN was the departure-based half): a
# document not re-reviewed within its SLA is flagged so its accountable owner re-reviews
# it. CONFIG IS THE SOURCE OF TRUTH (like ownership): a human stamps `reviewed` on the
# document; staleness is graded against an INJECTED `now` (never the wall clock) and the
# SLA is audience-aware. Golden source of truth (EPIC R discipline).
features:
  - id: FEAT-STALENESS-001
    title: Pure staleness grading engine
    summary: >-
      staleness.grade_doc / detect_stale grade a document's `reviewed` date against an
      INJECTED `now` (no wall clock, K10) and its SLA — the one shared core reused by the
      CLI and the server route. Pure + offline (K1): no I/O, no backend, no clock read.
    subsystem: staleness
    modules: [staleness]
    constraints: [K1, K10]

  - id: FEAT-STALENESS-002
    title: Fresh / stale / never-reviewed classification
    summary: >-
      A doc with no `reviewed` stamp is NEVER_REVIEWED; one reviewed longer than its SLA
      ago is STALE (with the age in days); otherwise FRESH (omitted from the report unless
      asked). Findings are deterministically sorted by doc_id (K10); a malformed `reviewed`
      date is a loud ConfigError (K8).
    subsystem: staleness
    modules: [staleness]
    constraints: [K8, K10]

  - id: FEAT-STALENESS-003
    title: Config-as-truth reviewed stamp + audience-aware SLA
    summary: >-
      DocumentSpec.reviewed (an ISO date, config = truth, additive K6) is the last-review
      source; StalenessConfig (default_days + per-audience audience_days) sets the SLA so a
      user-guide may get a longer window than an eng-guide (audience changes the verdict,
      K3). reviewed_docs_from_config projects a loaded config into the engine's input.
    subsystem: staleness
    modules: [staleness, config]
    constraints: [K3, K6]

  - id: FEAT-STALENESS-004
    title: cdx staleness CLI
    summary: >-
      The read-only `cdx staleness [--config][--now ISO][--json][--fail-on-stale]` command
      resolves the reviewed-docs from config and grades them against `--now` (default the
      wall clock) + the audience-aware SLA; the table shows only docs needing review, --json
      shows all, --fail-on-stale is a CI review gate. Pure + offline (K1/K4).
    subsystem: staleness
    modules: [cli]
    constraints: [K1, K3, K4]

  - id: FEAT-STALENESS-005
    title: Reviewed + resolved SLA mirrored at sync
    summary: >-
      configsync._build_rows projects each document's `reviewed` plus the audience-resolved
      `sla_days` (from the bundle's staleness policy) into ConfigDocument's existing JSON
      (additive, K6), so the server grades against the mirror without re-deriving the policy.
    subsystem: staleness
    modules: [server, configsync]
    constraints: [K6, K10]

  - id: FEAT-STALENESS-006
    title: Read-time GET /staleness view
    summary: >-
      GET /repos/{id}/staleness grades the synced docs' `reviewed` + `sla_days` against the
      app clock at READ time (deduped by doc_id, FRESH omitted unless include_fresh), so a
      doc goes stale on the NEXT read with no re-sync — mirroring the ownership read-time
      cascade. Open read, deterministic.
    subsystem: staleness
    modules: [server]
    constraints: [K10]
