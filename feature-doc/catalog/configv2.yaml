# Feature catalog — `configv2` subsystem (the multi-file `config/cdmon/` dir layout).
# Golden source of truth (EPIC R, slice R-02). Do not duplicate this prose
# elsewhere; the rendered feature-doc/FEATURES.md and the R-07 source wiki read
# from here. Covers ONLY the CONFIG-V2 dir-layout machinery — the classic
# single-file MonitorConfig model is owned by the separate `config` catalog.
features:
  - id: FEAT-CONFIGV2-001
    title: Multi-file config/cdmon directory layout
    summary: >-
      load_bundle reads a config/cdmon/ directory — index.yaml plus one
      <unit>.yaml per coverage unit plus ignore.yaml/doc-style.yaml — and merges
      it into one MonitorConfig wrapped in a ConfigBundle (config + index + units
      + doc_style), so downstream modules consume a single config and learn
      nothing about units; load_config_dir is the thin config-only wrapper.
    subsystem: configv2
    modules: [config]
    constraints: [K0, K8, K10]

  - id: FEAT-CONFIGV2-002
    title: Frontmatter + dir-covered + source-files-format unit schema
    summary: >-
      UnitFile (with UnitFrontmatter) models one coverage unit: a fenced
      ---frontmatter--- of traceability metadata pinned to CDMON_CONFIG_VERSION
      "2.0.0", then a body declaring dir-covered (>=1 owned directories),
      source-files-format (>=1 dotted extensions counted toward coverage), and
      DocumentSpec documents; load_unit_file enforces the frontmatter unit equals
      the filename stem.
    subsystem: configv2
    modules: [config]
    constraints: [K8, K10]

  - id: FEAT-CONFIGV2-003
    title: index.yaml globals and ordered unit index
    summary: >-
      IndexFile (with IndexFrontmatter and IndexUnitRef) models index.yaml: the
      repo globals that lift straight into MonitorConfig (root, backend, agent,
      central, coverage, region_templates) plus the ordered units: list and the
      ignore/doc-style pointers; load_index_file builds it and load_bundle
      enforces the cross-file rules.
    subsystem: configv2
    modules: [config]
    constraints: [K8, K10]

  - id: FEAT-CONFIGV2-004
    title: Cross-file bundle validation
    summary: >-
      load_bundle enforces the dir-layout invariants loudly: every listed unit
      file must exist, no duplicate document id across units, and no two units
      may claim an identical normalized dir-covered directory (nesting is allowed,
      identical is not).
    subsystem: configv2
    modules: [config]
    constraints: [K8, K10]

  - id: FEAT-CONFIGV2-005
    title: Nested deepest-wins unit attribution
    summary: >-
      unit_for_path (and ConfigBundle.unit_for_path) attributes a repo-relative
      path to the unit whose dir-covered is the deepest ancestor by path
      components, never string prefix, so a file under a nested child unit belongs
      to the child while a file directly in the parent belongs to the parent;
      ties on depth break by bundle order.
    subsystem: configv2
    modules: [config]
    constraints: [K10]

  - id: FEAT-CONFIGV2-006
    title: Effective coverage derived from the dir layout
    summary: >-
      effective_coverage derives a CoverageConfig purely from the bundle: include
      = each unit's dir-covered × source-files-format as d/**/*ext globs, exclude
      = ignore patterns plus translated .gitignore plus defaults, with
      deepest-wins per-extension scoping expressed as derived excludes, feeding
      the untouched coverage engine unchanged.
    subsystem: configv2
    modules: [config]
    constraints: [K10]

  - id: FEAT-CONFIGV2-007
    title: ignore.yaml plus .gitignore-to-globs translation
    summary: >-
      IgnoreFile (with IgnoreFrontmatter) models ignore.yaml's manual patterns
      and an opt-in gitignore: flag; gitignore_to_globs is a hand-rolled
      translation (no new dependency) of .gitignore text into inventory's exact
      ** glob semantics, deterministically sorted and deduped, merged into the
      coverage exclude set.
    subsystem: configv2
    modules: [config]
    constraints: [K0, K10]

  - id: FEAT-CONFIGV2-008
    title: One repo-root resolver
    summary: >-
      resolve_repo_root is the single normpath(config_dir / root) formula every
      consumer shares, so the dir layout (config_dir = <repo>/config/cdmon,
      root "../..") and the single-file layout (config_dir IS the repo, root ".")
      can never diverge on where the repo root is.
    subsystem: configv2
    modules: [config]
    constraints: [K10]

  - id: FEAT-CONFIGV2-009
    title: Index regeneration and reverse validation
    summary: >-
      regenerate_index rescans the on-disk *.yaml units (sorted, RESERVED_UNIT_STEMS
      excluded) and rewrites only index.yaml's units: block and frontmatter
      updated: line by textual surgery — preserving every other field byte-for-byte
      and staying idempotent; write_index persists it, and load_bundle's reverse
      invariant rejects any on-disk unit absent from the index.
    subsystem: configv2
    modules: [config]
    constraints: [K7, K8, K10]

  - id: FEAT-CONFIGV2-010
    title: Cycle-break leaf primitives
    summary: >-
      _v2base is the dependency leaf that breaks the config<->docstyle cycle: it
      owns CDMON_CONFIG_VERSION, the shared _V2_MODEL_CONFIG, the _FM_RE fence,
      and the loud _split_frontmatter / _parse_v2_body helpers, which config
      re-exports under its old paths so existing callers are unchanged.
    subsystem: configv2
    modules: [_v2base, config]
    constraints: [K0, K6, K8]

  - id: FEAT-CONFIGV2-011
    title: Canonical templates and dir scaffolder
    summary: >-
      templates_v2 holds the four canonical, loader-round-tripping templates
      (UNIT_TEMPLATE, INDEX_TEMPLATE, IGNORE_TEMPLATE, DOC_STYLE_TEMPLATE,
      aggregated in V2_TEMPLATES); scaffold_config_dir materializes a complete,
      load_bundle-valid config/cdmon/ by filling the {repo}/{now} placeholders,
      deterministic and loud on OS error.
    subsystem: configv2
    modules: [templates_v2]
    constraints: [K7, K8, K10]

  - id: FEAT-CONFIGV2-012
    title: DB-backed git/local config sync
    summary: >-
      configsync.run_sync is the server's POST /repos/{id}/sync engine: in local
      mode it reads the working tree, in git mode it materializes the default
      branch in a throwaway worktree (torn down in a finally), then loads the
      bundle, computes drift and coverage, and projects ConfigDocument /
      ConfigCodeRef rows plus a SyncRun summary without ever mutating the user's
      tree; read_config_at is the thin façade and GitInfo carries the git context.
    subsystem: configv2
    modules: [configsync]
    constraints: [K1, K8, K10]

  - id: FEAT-CONFIGV2-013
    title: Generate-to-disk engine
    summary: >-
      generate.apply_edits_to_disk turns staged ConfigEdit tickets into a live,
      git-tracked change — applying the pure model editors and dump_unit_file to
      the unit yaml, rewriting doc-style.yaml, regenerating the index, then
      scaffolding/healing each affected document mechanically (no LLM) — over a
      SCOPED write surface (only config/cdmon/*.yaml and declared .md docs),
      offline, deterministic, and idempotent; apply_record_fix is the per-record
      counterpart returning a unified diff.
    subsystem: configv2
    modules: [generate]
    constraints: [K1, K7, K8, K10]

  - id: FEAT-CONFIGV2-014
    title: Pure unit-file serializers and model editors
    summary: >-
      dump_unit_file serializes a UnitFile back to canonical ---fenced YAML that
      round-trips through load_unit_file and re-dumps byte-identically (the
      updated: field refreshed from an injected now); upsert_document,
      add_code_ref, remove_code_ref, and set_context_refs are pure editors each
      returning a new frozen UnitFile so edits can be composed then dumped once.
    subsystem: configv2
    modules: [config]
    constraints: [K7, K8, K10]

  - id: FEAT-CONFIGV2-015
    title: Index-source region rendering
    summary: >-
      render_index renders a source='index' managed region as a Markdown table
      over the config's other documents (excluding the index doc, optionally
      filtered by audience), one row per doc with synthetic columns (doc_id,
      title as a link to the HTML twin or .md, summary, link, audience, path) in
      deterministic config order.
    subsystem: configv2
    modules: [index]
    constraints: [K0, K2, K10]

  - id: FEAT-CONFIGV2-016
    title: README / narrative-document monitoring
    summary: >-
      A narrative Markdown document such as README.md is a first-class monitored
      document: it is declared in a config/cdmon unit with code_refs naming the
      source files it describes and NO managed region, so the engine tracks it by
      the whole-doc fingerprint over that code surface and never authors its prose
      (K2). As a user-guide its drift is audience-gated — a comment/docstring or
      private change to a referenced source file is a non-event, only a real
      public-surface change drifts it (K3) — and the drift is recorded as a
      ReviewRecord for a human, never auto-rewritten (K5); monitor --apply only
      refreshes its fingerprint. To keep an eng-only api-index from being forced
      to list such a user-guide README, the INDEX_INCOMPLETE lint honors the index
      region's audience kind, so an index need only link the documents it renders.
      cdx dogfoods this on its own README.md.
    subsystem: configv2
    modules: [config, drift, layout]
    constraints: [K0, K2, K3, K5, K10]

  - id: FEAT-CONFIGV2-017
    title: Test → test-doc mirror
    summary: >-
      Test files are monitored exactly like source files: a config/cdmon unit
      whose code_refs point at tests/** and whose documents live under a top-level
      test-docs/ directory maps each test file 1:1 to a test-doc carrying a managed
      symbols region that lists the file's test_* functions. It is the SAME engine
      as source -> docs with no new code — a test file is just a .py file (K0), so
      the extractor, drift detector, healer, and coverage resolver all work
      unchanged. The test file is the source of truth and the test-doc is graded
      against it, never the reverse (K2); editing or renaming a test drifts its
      test-doc and records a ReviewRecord for a human (K5), and monitor --apply
      heals it idempotently (K7). The demo maps all four of its test files to
      test-docs 1:1, and cdx dogfoods the pattern on its own tests/smoke
      boundary; the console surfaces test-docs in a dedicated Test docs section on
      the Documents, Drift, and Mapping pages.
    subsystem: configv2
    modules: [config, extract, heal]
    constraints: [K0, K2, K5, K7, K10]
