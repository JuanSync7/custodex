# Feature catalog â€” `ownership` subsystem (EPIC OWN: peg a human/team to every
# monitored document so a codeâ†’doc drift always has an accountable owner, and a
# person leaving can never silently leave a document ownerless).
# Golden source of truth (EPIC R discipline). Two tiers: ownership-of-record lives
# per-repo in config (the SOURCE OF TRUTH, K0 / the K2 scope note); the central
# server roster is a MIRROR that flags departed owners. Reassignment (config =
# truth) is the human fix for an orphan.
features:
  - id: FEAT-OWNERSHIP-001
    title: Per-document ownership-of-record
    summary: >-
      DocumentSpec carries optional owner/team/dri keys (additive, K6) so a document
      declares its accountable identity in config â€” the single source of truth for
      ownership (K0, never inferred from code). Own by team with a person as the
      current DRI, so a departure demotes to "DRI vacant" rather than orphaning the
      doc; the keys round-trip byte-identically through dump_unit_file (K7) and a
      doc that declares none inherits its unit's frontmatter owner.
    subsystem: ownership
    modules: [config]
    constraints: [K0, K2, K6, K7]

  - id: FEAT-OWNERSHIP-002
    title: Pure ownership resolver + roster snapshot
    summary: >-
      ownership.resolve_ownership projects a loaded config into one EffectiveOwner
      per document â€” accountable = driâ†’ownerâ†’teamâ†’inherited unit owner, durable =
      teamâ†’ownerâ†’inherited â€” sorted and clock-free (K1/K10). The Identity /
      RosterSnapshot models are the offline, injected central mirror an
      unknown-or-departed name reads as inactive against (is_active(None) and an
      unknown name are both False â€” an owner the roster cannot vouch for is not an
      active accountable party).
    subsystem: ownership
    modules: [ownership]
    constraints: [K0, K1, K10]

  - id: FEAT-OWNERSHIP-003
    title: Orphan & DRI-vacant detection (pure)
    summary: >-
      ownership.detect_orphans classifies each resolved document against the
      injected roster snapshot â€” UNOWNED (no identity named), ORPHAN_OWNER_DEPARTED
      (the accountable owner is departed/unknown with no active fallback), or
      ORPHAN_DRI_VACANT (the DRI left but the durable team still owns it â€” a soft
      orphan resolved by assigning a new DRI). An orphan is never healable (no code
      change fixes it); OK docs are omitted by default so the result is exactly what
      needs a human (K5). Pure, sorted, clock-free (K1/K10).
    subsystem: ownership
    modules: [ownership]
    constraints: [K1, K5, K8, K10]

  - id: FEAT-OWNERSHIP-004
    title: cdmon ownership CLI (read-only accountability gate)
    summary: >-
      cdmon ownership lists every document's accountable/durable owner from config
      and, given an offline --roster YAML, cross-checks it to flag orphaned
      (departed-owner) documents â€” pure, offline (K1/K4), no backend. --json emits
      {owners, findings}; --fail-on-orphan turns a departed-owner orphan into a
      nonzero exit (an accountability CI gate), while an UNOWNED doc (a coverage
      gap, not a departure) does not trip it. load_roster is loud on a malformed
      roster (K8).
    subsystem: ownership
    modules: [cli, ownership]
    constraints: [K1, K4, K8, K10]

  - id: FEAT-OWNERSHIP-005
    title: Central roster mirror (persisted, both stores)
    summary: >-
      The central server persists a roster of identities (people/teams) as the
      accountability MIRROR â€” upsert_identity / list_roster / mark_identity_departed
      on the Store Protocol, implemented identically over InMemoryStore AND SqlStore
      (Postgres-first; SQLite offline twin + pg) and created by Alembic migration
      0006. The per-document owner/team/dri + resolved accountable/durable ride in
      the existing config_documents JSON column (additive, K6 â€” NO column
      migration). Insertion-ordered, injected timestamps (K10).
    subsystem: ownership
    modules: [server, ownership]
    constraints: [K0, K4, K6, K10]

  - id: FEAT-OWNERSHIP-006
    title: Admin-token roster routes (global, not per-repo)
    summary: >-
      POST /admin/roster (upsert) and POST /admin/roster/{name}/departed gate
      cross-repo roster mutations behind a SEPARATE global admin token
      ($CDMON_ADMIN_TOKEN), never a per-repo token â€” a leaked repo token must not
      grant roster access (401 missing / 403 wrong; open when unset, for dev). GET
      /roster is an open read. A departed mark on an unknown name is a loud 404 (K8).
    subsystem: ownership
    modules: [server]
    constraints: [K0, K8]

  - id: FEAT-OWNERSHIP-007
    title: Per-repo /ownership view + cross-repo departure cascade
    summary: >-
      GET /repos/{id}/ownership reads the synced config documents (which carry the
      resolved accountable/durable owner) and crosses them against the LIVE roster
      through ownership.detect_orphans, returning {owners, findings, orphan_count}.
      Because the orphan check runs on READ, marking one identity departed cascades â€”
      every document that identity is accountable for, across EVERY repo, flips to an
      orphan on the next read with no re-sync. Open read; deterministic (K5/K10).
    subsystem: ownership
    modules: [server, ownership]
    constraints: [K0, K5, K10]
