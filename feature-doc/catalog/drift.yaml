# Feature catalog — `drift` subsystem (detect-only doc<->code drift grading).
# Golden source of truth (EPIC R). Do not duplicate this prose elsewhere; the
# rendered feature-doc/FEATURES.md and the R-07 source wiki read from here.
features:
  - id: FEAT-DRIFT-001
    title: Detect-only drift grading
    summary: >-
      detect(config, config_dir) grades every document in a MonitorConfig against
      its freshly built code surface and returns a DriftReport — pure and
      side-effect free (K1): it never writes a file and never calls a backend.
      The repo root is the one shared resolve_repo_root(config_dir, root) formula.
    subsystem: drift
    modules: [drift]
    constraints: [K1, K2]

  - id: FEAT-DRIFT-002
    title: Drift kind taxonomy
    summary: >-
      DriftKind enumerates the four discrepancy classes — MISSING_DOC (the doc
      file is absent, a stub can be created), HASH (the stored fingerprint differs
      from the surface hash), REGION (a managed region body is stale), and
      UNHEALABLE (a managed region with no known renderer the engine cannot
      regenerate).
    subsystem: drift
    modules: [drift]
    constraints: [K1]

  - id: FEAT-DRIFT-003
    title: Drift as data, never an exception
    summary: >-
      Each finding is a frozen Drift model carrying kind, doc_id, doc_path,
      detail, optional region_id, a healable flag, the doc's audience and an
      optional unified diff — drift is reported as data, distinct from the
      DriftError raised only for operational failures.
    subsystem: drift
    modules: [drift]
    constraints: [K1]

  - id: FEAT-DRIFT-004
    title: Audience-aware drift suppression
    summary: >-
      Every Drift carries the document's audience and the audience rule (K3) is
      honored: a docstring/comment- or private-symbol-only change does not move a
      user-guide surface hash (the extraction filter already excludes those) so it
      produces no HASH drift for a user-guide, while it does for an eng-guide.
    subsystem: drift
    modules: [drift]
    constraints: [K3]

  - id: FEAT-DRIFT-005
    title: Which-tier-moved HASH reporting
    summary: >-
      On a HASH drift, when the doc carries stored per-tier digests, detect names
      which surface tier(s) moved (signature / docstring / body) via
      SurfaceFingerprint.drifted_against, recorded on Drift.drifted_tiers; an old
      doc with only a composite fingerprint falls back to a composite-only message
      with empty drifted_tiers.
    subsystem: drift
    modules: [drift]
    constraints: [K6]

  - id: FEAT-DRIFT-006
    title: Anchor-identity change classification
    summary: >-
      On a HASH drift, detect compares the documented symbol anchor_ids against the
      stamped region anchor set and records Drift.anchors_added / anchors_removed —
      both empty means the SAME symbols changed internally (a re-bind/move), while a
      nonempty delta means a symbol was added, removed or renamed (a structural
      change). Empty when the doc predates anchor stamping.
    subsystem: drift
    modules: [drift]
    constraints: [K2]

  - id: FEAT-DRIFT-007
    title: Region ownership and lockability
    summary: >-
      detect grades only regions the spec declares: a human (or an llm-seeded
      region locked once a human edited it, via the shared region_is_locked
      predicate) region whose code moved is reported for manual review but marked
      healable=False so the engine never auto-edits it, while a stale rendered
      region is a healable REGION drift.
    subsystem: drift
    modules: [drift]
    constraints: [K1]

  - id: FEAT-DRIFT-008
    title: Persistent human-review advisory
    summary: >-
      A human-owned region carries a stored per-region hash stamped when last
      reviewed; while the body still matches that stamp the advisory keeps firing
      across a fingerprint heal until the human acknowledges, and with no stamp yet
      detect falls back to the code-moved fingerprint signal.
    subsystem: drift
    modules: [drift]
    constraints: [K1]

  - id: FEAT-DRIFT-009
    title: LLM-authored region staleness
    summary: >-
      A pure-llm region (no mechanical renderer) is backend-authored prose, not
      graded against a render: its body stands while the surface is unchanged and is
      surfaced as a healable REGION drift only when the whole-doc fingerprint
      diverges, so the backend re-authors it from the current surface.
    subsystem: drift
    modules: [drift]
    constraints: [K1, K4]

  - id: FEAT-DRIFT-010
    title: Report aggregation and human summary
    summary: >-
      DriftReport bundles the tuple of drifts with an ok property (true when no
      drift) and a summary() that renders one human-readable line per drift —
      doc_id, optional region, kind, an UNHEALABLE marker and detail.
    subsystem: drift
    modules: [drift]
    constraints: [K1]

  - id: FEAT-DRIFT-011
    title: Breaking-change severity classification
    summary: >-
      On a HASH drift, detect classifies a Griffe-style ChangeSeverity purely from
      the P2 drifted_tiers + the P4 anchor deltas already computed (no new analysis):
      classify_change_severity returns BREAKING for a removed/renamed symbol or an
      in-place signature change (same symbol set, signature tier moved), ADDITIVE for
      a purely added symbol (additions are non-breaking even though they move the
      signature tier), COSMETIC for a docstring/body-only move, and UNKNOWN for a
      composite-only old doc with no structural signal. It rides on
      Drift.change_severity, is annotated in DriftReport.summary() for a HASH drift
      (UNKNOWN stays silent), and is mirrored onto the ReviewRecord as the additive
      1.2.0 `change_severity` field so the audit log and central hub see breaking vs
      additive vs cosmetic at a glance.
    subsystem: drift
    modules: [drift, schema, monitor]
    constraints: [K6, K10]

  - id: FEAT-DRIFT-012
    title: Per-symbol signature digests close the masked breaking-change case
    summary: >-
      DIG-01 stores a per-symbol signature digest map (`cdm.symbol_sigs`, keyed by the
      stable anchor_id, hashing ONLY the name/kind/signature/is_public payload) — added to
      SurfaceFingerprint.sig_by_anchor in extract (not part of any hashed payload, so the
      composite stays byte-identical), stamped by heal AFTER set_fingerprint (additive,
      survives later heals via the cdm-map copy, K7), with manifest
      stored_symbol_sigs/set_symbol_sigs mirroring region_anchors. detect computes
      `sigs_changed` — the SURVIVING documented symbols whose signature digest moved
      (current ∩ stored, diffed) — and classify_change_severity returns BREAKING on a
      non-empty sigs_changed ABOVE the addition rule, closing the former masked
      false-negative where an in-place signature change was hidden as ADDITIVE whenever a
      symbol was also added in the same edit. A pure addition (no survivor moved) stays
      ADDITIVE and a docstring/body-only move stays COSMETIC (no over-fire); a doc that
      predates DIG-01 (no stored digests) degrades to the aggregate behaviour and never
      crashes (K6/K8). No schema bump — `change_severity` is simply more accurate.
    subsystem: drift
    modules: [extract, manifest, heal, drift]
    constraints: [K6, K8, K10]
