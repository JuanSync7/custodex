# Feature catalog — `manifest` subsystem (documents with machine-managed regions
# + front-matter fingerprint state). Golden source of truth (EPIC R). Do not
# duplicate this prose elsewhere; the rendered feature-doc/FEATURES.md and the
# R-07 source wiki read from here.
features:
  - id: FEAT-MANIFEST-001
    title: Front-matter document parse
    summary: >-
      parse_doc reads a file and parse_text (its file-I/O-free twin) split an
      optional leading YAML front-matter fence from the body into a frozen Doc
      (path, meta, body, raw); malformed or non-mapping front matter raises a
      loud DriftError.
    subsystem: manifest
    modules: [manifest]
    constraints: [K7, K8]

  - id: FEAT-MANIFEST-002
    title: Managed-region model
    summary: >-
      regions maps each CDM:BEGIN/CDM:END managed-region id to its body text,
      raising a loud DriftError on malformed structure (unterminated, duplicate,
      nested, orphan END, or mismatched END id).
    subsystem: manifest
    modules: [manifest]
    constraints: [K8]

  - id: FEAT-MANIFEST-003
    title: Byte-exact region edit
    summary: >-
      set_region replaces one region's body and returns (text, changed),
      preserving every byte outside the markers exactly and reporting
      changed=False when the id is absent or its body already equals the new
      text.
    subsystem: manifest
    modules: [manifest]
    constraints: [K7, K8]

  - id: FEAT-MANIFEST-004
    title: Composite fingerprint storage
    summary: >-
      stored_fingerprint reads cdm.fingerprint from a Doc's meta and
      set_fingerprint returns a copy of meta with cdm.fingerprint set, copying
      the whole cdm map forward so sibling keys survive.
    subsystem: manifest
    modules: [manifest]
    constraints: [K10]

  - id: FEAT-MANIFEST-005
    title: Tiered fingerprint storage
    summary: >-
      stored_fingerprint_tiers decodes the additive cdm.fingerprint_tiers block
      back into a SurfaceFingerprint (None on a pre-P2 doc) and
      set_fingerprint_tiers stamps it beside the composite, omitting None
      sub-tiers for a faithful round-trip.
    subsystem: manifest
    modules: [manifest, extract]
    constraints: [K6, K10]

  - id: FEAT-MANIFEST-006
    title: Per-region content hash
    summary: >-
      region_body_hash returns a CRLF-normalized sha256[:16] of a region body
      (mirroring layout.md_source_hash); stored_region_hash and set_region_hash
      read and additively stamp cdm.region_hashes[region_id] so a stamped hash
      survives a later heal.
    subsystem: manifest
    modules: [manifest]
    constraints: [K10]

  - id: FEAT-MANIFEST-007
    title: Shared region-lock predicate
    summary: >-
      region_is_locked is the single shared lock truth consumed by drift and
      heal: a region is locked iff it has a stored region hash AND the current
      body's hash differs from it (a human edited it since the engine stamped
      it); no stored hash means never locked.
    subsystem: manifest
    modules: [manifest]
    constraints: [K10]

  - id: FEAT-MANIFEST-008
    title: Region anchor storage
    summary: >-
      stored_region_anchors reads cdm.region_anchors[region_id] as a tuple (None
      on a pre-P4 doc) and set_region_anchors additively stamps the sorted
      anchor_ids of the symbols a region documents, so drift can tell a symbol
      add/remove/rename from a purely internal change.
    subsystem: manifest
    modules: [manifest]
    constraints: [K10]

  - id: FEAT-MANIFEST-009
    title: Standard-meta stamp and re-render
    summary: >-
      stamp_standard_meta sets the Layout Standard static keys cdm.schema_version
      and cdm.audience while preserving every other cdm key, and render_doc
      re-emits front matter plus body to one string (body verbatim when meta is
      empty, sorted-key YAML fence otherwise).
    subsystem: manifest
    modules: [manifest]
    constraints: [K7, K10]
