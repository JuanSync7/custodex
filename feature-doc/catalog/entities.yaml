# Feature catalog — `entities` subsystem (AGT-01: the deterministic mention layer).
# EPIC AGT's foundation: entity LINKING over managed-doc prose against a closed
# registry (the code surface + the managed-doc set + the full repo tree) — never
# open-set NER, never an LLM at index time (the LazyGraphRAG split). Precision
# beats recall: an ambiguous mention is unresolved-or-ignored, never guessed.
# Golden source of truth (EPIC R discipline).
features:
  - id: FEAT-ENTITIES-001
    title: Deterministic entity extraction + mention linking over doc prose
    summary: >-
      entities.extract_doc_entities parses one managed doc's PROSE deterministically
      (pure, no clock, no I/O — K1/K10): fenced code blocks and CDM:BEGIN/END machine
      regions are stripped first (machine text never mints a mention; blank-line
      replacement keeps Mention.line FILE-accurate, front-matter height included), then
      headings become the doc's own SECTION entities (GitHub-style slugs, repeated slugs
      deduplicated -2/-3), inline markdown links classify as URL / DOC (managed) / PATH
      (full repo tree, files AND directories), and inline backtick spans classify by the
      pinned precision rules: spans with whitespace, braces, glob metachars or colons
      mint nothing (HTTP routes, CLI invocations, CDM markers); path-shaped spans resolve
      exact-path-then-unique-basename (an AMBIGUOUS basename mints nothing — existing-
      but-ambiguous is not rot); SCREAMING_SNAKE spans resolve registry-first then the
      configured env-prefix gate (else ignored, so enum names never masquerade as env
      vars); identifier spans resolve by exact registry match, where only dotted,
      snake_case, or multi-hump CamelCase spans may surface UNRESOLVED — a plain word
      resolves or is ignored, never noise. Symbol resolution is exact-match only:
      qualified Class.method, module-qualified stem.name (registered only while the stem
      is unique) and full-dotted pkg.mod.name forms; a bare name needs GLOBAL uniqueness
      AND no module-stem collision (the measured app/coverage/index cli.py trap is
      blocked); a bare name matching only a unique module stem resolves as a PATH mention
      to that file, and a dotted package mention (custodex.server) resolves as a PATH to
      the directory/module. Unresolved mentions are first-class data (the Obsidian rule)
      — the graph-rot signal downstream slices consume. Every entity has a SCIP-style
      deterministic string id ("symbol custodex/drift.py#detect_drift").
    subsystem: entities
    modules: [entities]
    constraints: [K0, K1, K10, K11]
    status: implemented
  - id: FEAT-ENTITIES-002
    title: Registry resilience + the `entities:` config block (target noise via config)
    summary: >-
      entities.build_registry constructs the closed resolution universe — managed-doc
      paths/ids, per-file public symbols via the LANGUAGE-GUARDED extractor registry
      (a file's suffix picks its extractor; shell functions ride along for free), and
      the FULL repo file+dir tree for PATH resolution (independent of the coverage
      inventory, so prose mentions of non-code files and directories resolve). It is
      RESILIENT by design: an unparseable source file or an unregistered suffix becomes
      a warnings entry with zero symbols — a read-only advisory scan never aborts on one
      bad file, so background ticks survive arbitrary adopter repos. Target-specific
      noise enters through config, never the engine (K0): the additive `entities:`
      block (EntitiesConfig, default-empty so every pre-AGT config loads unchanged, K6)
      carries `ignore` (spans that mint no mention — tool names, config keys,
      illustrative example paths) and `env_prefixes` (a SCREAMING_SNAKE span becomes an
      ENV_VAR entity only under a configured prefix). Wired through BOTH config forms
      (single-file and the config/cdmon dir layout's index.yaml globals lift).
    subsystem: entities
    modules: [entities, config]
    constraints: [K0, K6, K8, K10]
    status: implemented
  - id: FEAT-ENTITIES-003
    title: "`cdx entities` — the mention report + the dogfood precision budget"
    summary: >-
      `cdx entities [DOC_ID] [--json] [--unresolved]` is the read-only CLI surface
      (K1/K4): per-document mention lists with file-accurate line numbers, `--unresolved`
      filtering to the graph-rot view, `--json` emitting the sorted DocEntities dumps,
      and a loud typed error on an unknown doc id (K8). The PRECISION BUDGET is part of
      the contract, not an aspiration: the dogfood integration test runs the scanner
      over THIS repo's real managed corpus and pins (a) an EMPTY day-one unresolved set
      (the rot signal starts clean — the seeded config/cdmon `entities:` stoplist is
      justified entry-by-entry), (b) no mention text matching a noise shape (routes,
      globs, colon markers, whitespace fragments), and (c) the measured misresolution
      traps (app/coverage/index) staying blocked — so a precision regression fails the
      suite the same way a stale wiki fails the freshness gate. The DEMOS.md header-id
      uniqueness smoke lint ships with this slice (the review found DEMO-052/053/054
      duplicated; the traceability engine scans only Features: tags, so collisions were
      silent).
    subsystem: entities
    modules: [entities, cli]
    constraints: [K1, K4, K8, K10, K11]
    status: implemented
