---
# Frontmatter (REQUIRED): traceability metadata. `unit` MUST equal this file's
# stem ("core"), or load_unit_file raises a loud ConfigError (K8).
cdmon-config-version: "2.0.0"
unit: core
title: "Taskflow core: model + scheduling engine"
owner: demo-team
created: "2026-06-07"
updated: "2026-06-07"
---
# Body: the coverage scope this unit owns + the documents it carries.

# This unit owns the core package. dir-covered is disjoint from the io unit's
# directory, so each .py file belongs to exactly one unit (no overlap, K8).
dir-covered:
  - src/taskflow/core

# Only .py files under dir-covered count toward coverage. The sibling
# `notes.log` (under src/taskflow/core) is therefore NOT in the denominator.
source-files-format:
  - ".py"

documents:
  - id: core-api
    path: docs/api/core-api.md
    audience: eng-guide
    # EPIC OWN — ownership-of-record (config = truth). The core API doc is owned by
    # the demo team, with Dana as the current DRI (a person can leave; the team
    # stays accountable). `cdx ownership` lists this; resolve_ownership computes
    # accountable=dana, durable=demo-team.
    owner: demo-team
    team: demo-team
    dri: dana
    # EPIC SLA — last reviewed long ago (config = truth), so GET /staleness +
    # `cdx staleness` flag core-api STALE (past its 90-day review SLA). This doc is
    # thus BOTH a soft ownership orphan (Dana departed) AND overdue for review.
    reviewed: "2024-06-01"
    region_keys: ["symbols"]
    code_refs:
      - path: src/taskflow/core/model.py
      - path: src/taskflow/core/engine.py

  # A user-facing guide (audience: user-guide) over the two most user-facing
  # public types. Its single managed `symbols` region uses SYMBOL-SELECTIVE
  # code_refs (Task from model.py, Engine from engine.py) — both files are
  # already documented by core-api, so this adds NO new coverage gap.
  - id: getting-started
    path: docs/guide/getting-started.md
    audience: user-guide
    # EPIC SLA — recently reviewed, so this user-guide is FRESH (within its SLA).
    reviewed: "2026-06-15"
    region_keys: ["symbols"]
    code_refs:
      - path: src/taskflow/core/model.py
        symbols: ["Task"]
      - path: src/taskflow/core/engine.py
        symbols: ["Engine"]
    # context_refs (EDITOR E-01, additive/K6): "glance-through" references the
    # author refers to when writing this tour — NOT documented surface, NOT
    # coverage, NOT drift. They flow into the editable tree + the generation
    # prompt, never into code_refs or the denominator (scheduler.py stays the
    # only gap; this doc still adds no new coverage).
    context_refs:
      - path: docs/api/core-api.md
        note: "the full engine reference"
      - path: src/taskflow/core/engine.py
        note: "scheduling semantics referenced in the tour"

  # The adopter README — a USER-GUIDE narrative monitored against the core model
  # it describes (FEAT-CONFIGV2-016). It declares NO managed region, so cdx
  # never authors its prose; it is tracked by the whole-doc fingerprint over
  # `model.py`'s public surface. As a user-guide, a comment/docstring/private
  # change is a non-event (K3); only a real public-surface change drifts it,
  # surfacing a ReviewRecord for a human (K5). `model.py` is already documented
  # by core-api, so this adds NO new coverage gap.
  - id: readme
    path: README.md
    audience: user-guide
    code_refs:
      - path: src/taskflow/core/model.py
