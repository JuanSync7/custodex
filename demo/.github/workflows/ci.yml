name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff format --check .
          ruff check .
      - name: Test
        run: pytest

  docs:
    name: docs in sync (cdmon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install code-doc-monitor
        run: pip install code-doc-monitor
      # Fail the build if a documented symbol drifted from its managed region.
      - name: Check docs are in sync
        run: python -m code_doc_monitor.cli check --config config/cdmon
