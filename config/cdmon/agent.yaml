---
# Frontmatter (REQUIRED): traceability metadata. `unit` MUST equal this file's
# stem ("agent"), or load_unit_file raises a loud ConfigError (K8).
cdmon-config-version: "2.0.0"
unit: agent
title: "custodex remediation agent (LangGraph)"
owner: cdmon-team
created: "2026-06-07"
updated: "2026-06-07"
---
# Body: the coverage scope this unit owns + the document it carries.

# Nested under the core unit's custodex: every .py under
# custodex/agent is attributed HERE (deepest-wins, Z-01a).
dir-covered:
  - custodex/agent

source-files-format:
  - ".py"

documents:
  # The remediation agent (LangGraph workflow): backend, graph, prompts, runtime.
  - id: agent-workflow
    path: docs/api/agent-workflow.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/agent/backend.py
      - path: custodex/agent/graph.py
      - path: custodex/agent/prompts.py
      - path: custodex/agent/runtime.py
      - path: custodex/agent/state.py
