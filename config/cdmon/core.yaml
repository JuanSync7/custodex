---
# Frontmatter (REQUIRED): traceability metadata. `unit` MUST equal this file's
# stem ("core"), or load_unit_file raises a loud ConfigError (K8).
cdmon-config-version: "2.0.0"
unit: core
title: "custodex engine core"
owner: cdmon-team
created: "2026-06-07"
updated: "2026-06-07"
---
# Body: the coverage scope this unit owns + the documents it carries.

# This unit owns the engine package root. The nested `agent` and `server` units
# own their subdirectories; under Z-01a deepest-wins attribution a file directly
# under custodex (not under agent/ or server/) belongs to THIS unit.
dir-covered:
  - custodex

# Only .py files count toward coverage under dir-covered.
source-files-format:
  - ".py"

documents:
  # A landing page indexing the engineering docs below (no code_refs of its own).
  # `index: true` activates the structural lint that this page must link EVERY
  # other document — so adding a doc without linking it from here is caught.
  - id: api-index
    path: docs/api/index.md
    audience: eng-guide
    index: true
    region_keys: [api-index]

  - id: foundation
    path: docs/api/foundation.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/config.py
      - path: custodex/_v2base.py    # leaf: shared v2 frontmatter primitives
      - path: custodex/docstyle.py
      - path: custodex/templates_v2.py
      - path: custodex/errors.py
      - path: custodex/schema.py     # SHARED — only the public types here
        symbols: [Verdict, ProposedFix]

  - id: pipeline
    path: docs/api/pipeline.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/extract.py
      - path: custodex/manifest.py
      - path: custodex/blocks.py
      - path: custodex/drift.py

  - id: remediation
    path: docs/api/remediation.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/backends.py
      - path: custodex/monitor.py
      - path: custodex/heal.py
      - path: custodex/generate.py
      - path: custodex/sinks.py
      - path: custodex/reviewlog.py
      - path: custodex/schema.py      # SHARED — whole module here
      - path: custodex/ticket.py

  # Coverage ownership: file/symbol discovery, the doc-coverage cross, and the
  # generated coverage.rpt builder/renderer (CONFIG-V2 §3, N-04).
  - id: coverage-system
    path: docs/api/coverage-system.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/inventory.py
      - path: custodex/coverage.py
      - path: custodex/report.py

  # Doc rendering surface: index region, HTML twins, layout lint + scaffolding.
  - id: layout-build
    path: docs/api/layout-build.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/index.py
      - path: custodex/build.py
      - path: custodex/layout.py

  # The PR sync loop (EPIC C) + coverage-gap issues (EPIC H): should-sync gate +
  # docs-PR open/update + the surface-gaps issue transports.
  - id: pr-loop
    path: docs/api/pr-loop.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/syncpr.py
      - path: custodex/pr.py
      - path: custodex/issues.py

  # The central-system client (EPIC E/G): repo registry + record envelope, plus
  # the server-side config-sync engine that reads a registered repo read-only.
  - id: central-client
    path: docs/api/central-client.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/registry.py
      - path: custodex/configsync.py
      - path: custodex/gitfetch.py    # EPIC GIT: clone-on-demand (STEP 0)
      - path: custodex/secrets.py     # EPIC GIT: at-rest credential sealing (PHASE 1)
      - path: custodex/gitauth.py     # EPIC GIT: short-lived token minting (PHASE 2)
    # context_refs (EDITOR E-01, additive/K6): generation-context "glance-through"
    # references, NOT documented surface and NOT coverage. configsync reprojects a
    # registered repo into the SQL rows the central server serves, so an author of
    # this doc should glance at the server unit's doc to see the consuming surface.
    context_refs:
      - path: docs/api/server.md
        note: "the central server that reads the config_documents/sync_runs rows configsync writes"

  # Learning loop (EPIC F): near-duplicate detection + waiver/fix promotion.
  - id: learning
    path: docs/api/learning.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/similar.py
      - path: custodex/promotion.py

  # Ops surface: the `cdx` CLI command functions + the `doctor` self-check.
  - id: ops
    path: docs/api/ops.md
    audience: eng-guide
    region_keys: [symbols]
    code_refs:
      - path: custodex/cli.py
      - path: custodex/doctor.py

  # The project README — a USER-GUIDE narrative monitored against the CLI surface
  # it documents (FEAT-CONFIGV2-016). It declares NO managed region, so the engine
  # never authors its prose; it is tracked by the whole-doc fingerprint over the
  # `cli.py` public surface. Because the audience is user-guide, a docstring- or
  # comment-only change to cli.py is a NON-event (K3) — only a real change to the
  # public command surface drifts the README, which then surfaces a ReviewRecord
  # for a human to act on (K5). Reheal its fingerprint with `cdx monitor --apply`
  # after a CLI surface change, exactly like the other tracked docs.
  - id: readme
    path: README.md
    audience: user-guide
    code_refs:
      - path: custodex/cli.py
