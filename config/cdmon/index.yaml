# custodex's own configuration (dir layout) — it monitors ITS OWN source
# against its own engineering docs (dogfooding the CONFIG-V2 multi-file layout).
# `schema.py` is a SHARED file: the `foundation` doc references just its public
# verdict/fix types (sub-file `symbols` selection), while the `remediation` doc
# references the whole module. Run `cdx check` to see drift, `cdx monitor
# --apply` to auto-close it. Mirrors the root `cdmon.yaml` exactly.

# Repo root RELATIVE TO this config directory. config/cdmon/ sits two levels
# below the repo root, so the canonical "../.." lands on the repo root.
root: "../.."

version: "2.0.0"
apply_default: false

backend:
  kind: mock            # swap to "claude-code" or "api" with no code change

# LangGraph remediation runtime (only used when backend.kind: agent).
agent:
  driver: claude-code

central:
  sink: none            # set to "file" + path, or "http" + url, to ship records

# A `source: index` region lists OTHER documents (a collection/landing page).
# Columns map per-doc synthetic fields: title (linked), summary, audience, ...
# `kind: eng-guide` SCOPES this index to the engineering docs: render_index only
# lists eng-guide docs here, and the INDEX_INCOMPLETE lint only requires those to
# be linked — so the user-guide README (FEAT-CONFIGV2-016) is monitored without
# being dragged onto this engineering landing page.
region_templates:
  api-index:
    source: index
    kind: eng-guide
    columns:
      - {header: "Document", field: "title"}
      - {header: "What it covers", field: "summary"}

# Global coverage block: intentional, justified documentation gaps (waivers).
# Package __init__ files are pure re-export aggregators: their `__all__` and
# `__version__` are not a documentable surface of their own — every symbol they
# re-export is documented in its HOME module. Waived so the remainder is explicit
# and the % reflects real intent.
coverage:
  waive:
    - path: "custodex/__init__.py"
      reason: "re-export aggregator; symbols documented in their home modules"
    - path: "custodex/agent/__init__.py"
      reason: "re-export aggregator; symbols documented in agent-workflow doc"
    - path: "custodex/server/__init__.py"
      reason: "re-export aggregator; symbols documented in server doc"
    - path: "custodex/featurecatalog.py"
      reason: "EPIC R golden catalog; documented in feature-doc/, api doc owned by R-07 cdx wiki"
    - path: "custodex/traceability.py"
      reason: "EPIC R traceability; documented in feature-doc/, api doc owned by R-07 cdx wiki"
    - path: "custodex/testwiki.py"
      reason: "EPIC R test wiki; documented in feature-doc/, api doc owned by R-07 cdx wiki"
    - path: "custodex/srcindex.py"
      reason: "EPIC R source index; documented in feature-doc/, api doc owned by R-07 cdx wiki"
    - path: "custodex/wiki.py"
      reason: "EPIC R wiki regeneration; documented in feature-doc/, api doc owned by R-08 cdx wiki"
    - path: "custodex/ownership.py"
      reason: "EPIC OWN ownership/accountability core; documented in feature-doc/catalog/ownership.yaml (api doc owned by cdx wiki)"
    - path: "custodex/settings.py"
      reason: "EPIC SVR operator runtime settings core; documented in feature-doc/catalog/settings.yaml (api doc owned by cdx wiki)"
    - path: "custodex/staleness.py"
      reason: "EPIC SLA staleness/review-SLA core; documented in feature-doc/catalog/staleness.yaml (api doc owned by cdx wiki)"
    - path: "custodex/docdeps.py"
      reason: "EPIC B doc↔doc dependency / suspect-link core; documented in feature-doc/catalog/docdeps.yaml (api doc owned by cdx wiki)"
    - path: "custodex/worklist.py"
      reason: "WL-01 per-owner review worklist (accountability join); documented in feature-doc/catalog/worklist.yaml (api doc owned by cdx wiki)"
    - path: "custodex/entities.py"
      reason: "AGT-01 entity/mention layer; documented in feature-doc/catalog/entities.yaml (api doc owned by cdx wiki)"
