# code-doc-monitor's own configuration (dir layout) — it monitors ITS OWN source
# against its own engineering docs (dogfooding the CONFIG-V2 multi-file layout).
# `schema.py` is a SHARED file: the `foundation` doc references just its public
# verdict/fix types (sub-file `symbols` selection), while the `remediation` doc
# references the whole module. Run `cdmon check` to see drift, `cdmon monitor
# --apply` to auto-close it. Mirrors the root `cdmon.yaml` exactly.

# Repo root RELATIVE TO this config directory. config/cdmon/ sits two levels
# below the repo root, so the canonical "../.." lands on the repo root.
root: "../.."

version: "2.0.0"
apply_default: false

backend:
  kind: mock            # swap to "claude-code" or "api" with no code change

# LangGraph remediation runtime (only used when backend.kind: agent).
agent:
  driver: claude-code

central:
  sink: none            # set to "file" + path, or "http" + url, to ship records

# A `source: index` region lists OTHER documents (a collection/landing page).
# Columns map per-doc synthetic fields: title (linked), summary, audience, ...
# `kind: eng-guide` SCOPES this index to the engineering docs: render_index only
# lists eng-guide docs here, and the INDEX_INCOMPLETE lint only requires those to
# be linked — so the user-guide README (FEAT-CONFIGV2-016) is monitored without
# being dragged onto this engineering landing page.
region_templates:
  api-index:
    source: index
    kind: eng-guide
    columns:
      - {header: "Document", field: "title"}
      - {header: "What it covers", field: "summary"}

# Global coverage block: intentional, justified documentation gaps (waivers).
# Package __init__ files are pure re-export aggregators: their `__all__` and
# `__version__` are not a documentable surface of their own — every symbol they
# re-export is documented in its HOME module. Waived so the remainder is explicit
# and the % reflects real intent.
coverage:
  waive:
    - path: "code_doc_monitor/__init__.py"
      reason: "re-export aggregator; symbols documented in their home modules"
    - path: "code_doc_monitor/agent/__init__.py"
      reason: "re-export aggregator; symbols documented in agent-workflow doc"
    - path: "code_doc_monitor/server/__init__.py"
      reason: "re-export aggregator; symbols documented in server doc"
    - path: "code_doc_monitor/featurecatalog.py"
      reason: "EPIC R golden catalog; documented in feature-doc/, api doc owned by R-07 cdmon wiki"
    - path: "code_doc_monitor/traceability.py"
      reason: "EPIC R traceability; documented in feature-doc/, api doc owned by R-07 cdmon wiki"
    - path: "code_doc_monitor/testwiki.py"
      reason: "EPIC R test wiki; documented in feature-doc/, api doc owned by R-07 cdmon wiki"
    - path: "code_doc_monitor/srcindex.py"
      reason: "EPIC R source index; documented in feature-doc/, api doc owned by R-07 cdmon wiki"
    - path: "code_doc_monitor/wiki.py"
      reason: "EPIC R wiki regeneration; documented in feature-doc/, api doc owned by R-08 cdmon wiki"
    - path: "code_doc_monitor/ownership.py"
      reason: "EPIC OWN ownership/accountability core; documented in feature-doc/catalog/ownership.yaml (api doc owned by cdmon wiki)"
    - path: "code_doc_monitor/settings.py"
      reason: "EPIC SVR operator runtime settings core; documented in feature-doc/catalog/settings.yaml (api doc owned by cdmon wiki)"
    - path: "tests/smoke/__init__.py"
      reason: "empty test-package marker; no documentable surface (FEAT-CONFIGV2-017 test-doc mirror covers the smoke test modules themselves)"

# REQUIRED index of every unit file in this directory (stable, ordered). Every
# *.yaml unit on disk MUST be listed (run `cdmon index` to regenerate). The three
# code_doc_monitor units use Z-01a deepest-wins attribution: a file under
# code_doc_monitor/agent belongs to the `agent` unit, one under
# code_doc_monitor/server to `server`, and the rest to `core`. The `tests` unit
# covers tests/smoke (the test→test-doc mirror, FEAT-CONFIGV2-017).
units:
  - file: agent.yaml
  - file: core.yaml
  - file: server.yaml
  - file: tests.yaml
# Pointers to the ignore + doc-style files.
ignore: ignore.yaml
doc-style: doc-style.yaml
