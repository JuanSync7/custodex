# AGT-01 mention layer: what `cdx entities` may treat as an entity mention.
# `env_prefixes` gates ENV_VAR mentions to this repo's real env namespace;
# `ignore` lists spans this repo's prose uses that are NOT code entities —
# each entry justified by the dogfood precision test (tests/integration/
# test_entities_dogfood.py): illustrative example paths (docs/api.md,
# src/widget.py, X.md, X.html), external classes (TestClient, StateGraph),
# and config-KEY / field-name mentions below symbol granularity
# (cdm.schema_version, code_refs, context_refs, config_edit, use_persona,
# from_repo, live_llm).
entities:
  env_prefixes:
    - CDMON_
  ignore:
    - docs/api.md
    - src/widget.py
    - X.md
    - X.html
    - TestClient
    - StateGraph
    - cdm.schema_version
    - code_refs
    - context_refs
    - config_edit
    - use_persona
    - from_repo
    - live_llm

# REQUIRED index of every unit file in this directory (stable, ordered). Every
# *.yaml unit on disk MUST be listed (run `cdx index` to regenerate). The three
# custodex units use Z-01a deepest-wins attribution: a file under
# custodex/agent belongs to the `agent` unit, one under
# custodex/server to `server`, and the rest to `core`. The `tests` unit
# covers tests/smoke (the test→test-doc mirror, FEAT-CONFIGV2-017).
units:
  - file: agent.yaml
  - file: core.yaml
  - file: server.yaml
  - file: tests.yaml
# Pointers to the ignore + doc-style files.
ignore: ignore.yaml
doc-style: doc-style.yaml
