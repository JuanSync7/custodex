# custodex — operator runtime settings (EPIC SVR).
#
# These are the deployment knobs for the central server (`cdx-server`) and the
# standalone dashboard (`cdx serve`). Every value below is the BUILT-IN DEFAULT,
# so deleting this file changes nothing (back-compat). Edit a value, or override any
# of them at runtime with the matching environment variable (env WINS over this file;
# a CLI --host/--port wins over env).
#
# SECRETS ARE NOT HERE. The admin token, database URL and credential-sealing key stay
# in the environment ($CDMON_ADMIN_TOKEN / $CDMON_DATABASE_URL / $CDMON_SECRET_KEY);
# the console + `cdx settings` only report whether each is configured, never its value.

version: "1.0.0"

server:
  # Bind address + port for the central server (`cdx-server` / main()).
  # env: CDMON_SERVER_HOST / CDMON_SERVER_PORT
  host: "0.0.0.0"
  port: 33333

  # uvicorn log level (debug|info|warning|error|critical). env: CDMON_SERVER_LOG_LEVEL
  log_level: "info"

  # Host header allowlist (TrustedHostMiddleware). ["*"] = accept any Host (today's
  # behavior). In a real deployment set this to your actual hostname(s) to block
  # Host-header spoofing / DNS-rebinding. env: CDMON_TRUSTED_HOSTS (comma-separated)
  trusted_hosts: ["*"]

  # Cross-origin policy (CORSMiddleware). An EMPTY allow_origins list disables CORS
  # entirely (same-origin SPA only — today). List origins to allow a separately-hosted
  # frontend. env: CDMON_CORS_ORIGINS (comma-separated)
  cors:
    allow_origins: []
    allow_credentials: false
    allow_methods: ["*"]
    allow_headers: ["*"]

  # Per-process request throttle. null = no limit (today). A positive integer enables a
  # fixed-window per-client cap; NOTE it is per-worker, not distributed (with N workers
  # the effective limit is N×). env: CDMON_RATE_LIMIT_RPM
  rate_limit:
    requests_per_minute: null

  # Clone-on-demand / docs-PR git hardening.
  git:
    # Baseline SSRF allowlist for remote git hosts.
    allowed_hosts: ["github.com", "gitlab.com"]
    # Extra hosts (self-hosted GHE/GitLab), added to the baseline.
    # env: CDMON_ALLOWED_GIT_HOSTS (comma-separated)
    extra_allowed_hosts: []
    # Allow file:// remote urls (local mirror). Disable in a shared deployment.
    allow_file_scheme: true
    # Hard timeout (seconds) on the clone subprocess. null = no timeout (today).
    # env: CDMON_GIT_CLONE_TIMEOUT
    clone_timeout_seconds: null
