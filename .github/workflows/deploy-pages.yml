# Deploy the Custodex showcase (landing + live demo on sample data + wikis +
# tutorial) to GitHub Pages, served at custodex.juansync.dev (see frontend/public/
# CNAME). This is the STATIC showcase build (PUBLIC_SHOWCASE=true) — no backend; the
# `/demo` route runs the real console against a baked dataset. The live app + API are
# deployed separately (Dockerfile / DEPLOY.md), not here.
name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "feature-doc/**" # the wikis render from here
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Astro 6 requires Node >=22.12.0 (engines); 20.x is rejected at build.
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build showcase
        working-directory: frontend
        env:
          PUBLIC_SHOWCASE: "true"
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
