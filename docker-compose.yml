# code-doc-monitor central server + Postgres (EPIC SVR).
#
#   export CDMON_ADMIN_TOKEN=$(openssl rand -hex 32)
#   export CDMON_SECRET_KEY=$(openssl rand -base64 32)
#   docker compose up --build
#
# The server persists to Postgres (records/resolutions/coverage/roster survive a
# restart), the admin token gates the GLOBAL roster routes, and the KEK seals per-repo
# git credentials at rest. Non-secret tunables live in config/settings.yaml (mounted
# read-only); override any of them with a CDMON_* env var here.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cdmon
      POSTGRES_PASSWORD: ${CDMON_DB_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: cdmon
    volumes:
      - cdmon-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdmon"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # On startup store_from_env() migrates the schema (alembic) and uses a SqlStore.
      CDMON_DATABASE_URL: postgresql+psycopg://cdmon:${CDMON_DB_PASSWORD:-change-me-in-prod}@db:5432/cdmon
      # REQUIRED in a shared deployment: the GLOBAL admin token + the credential KEK.
      CDMON_ADMIN_TOKEN: ${CDMON_ADMIN_TOKEN:?set a strong admin token (openssl rand -hex 32)}
      CDMON_SECRET_KEY: ${CDMON_SECRET_KEY:?set a base64 32-byte KEK (openssl rand -base64 32)}
      # Example hardening overrides (otherwise from config/settings.yaml):
      # CDMON_TRUSTED_HOSTS: cdmon.example.com
      # CDMON_CORS_ORIGINS: https://cdmon.example.com
      # CDMON_RATE_LIMIT_RPM: "120"
    ports:
      - "33333:33333"
    volumes:
      - ./config/settings.yaml:/app/config/settings.yaml:ro
    healthcheck:
      # In-process urllib (the image is python:3.11-slim and has no curl/wget) hitting
      # the unauthenticated GET /health liveness probe.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:33333/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  cdmon-db:
